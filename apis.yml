description: >-
  AbbVie is a research-based biopharmaceutical company that discovers, develops, manufactures,
  and markets advanced therapies in immunology, oncology, neuroscience, and other
  specialty areas. AbbVie's portfolio includes treatments for autoimmune diseases,
  various cancers, neurological disorders, and aesthetics through the Allergan Aesthetics portfolio.
